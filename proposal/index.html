<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Ally · Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* v5.2 brand tokens — keep in sync with footprint/index.html */
    --bg-page: #09233C;
    --bg-panel: #0F2D4A;
    --bg-elevated: #15385C;
    --bg-elevated-2: #1C4570;
    --stroke-subtle: #244A6E;
    --stroke-rule: #355E84;
    --text-primary: #FFFFFF;
    --text-secondary: #A7BBD5;
    --text-tertiary: #6E83A2;
    --accent-gold: #FFAE00;
    --accent-gold-light: #FFC845;
    --accent-blue: #249AF4;
    --accent-blue-light: #7BB8F0;
    --accent-red: #D25151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #05172A; color: var(--text-primary);
    font-size: 14px; line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }

  .toolbar {
    background: #050B17; color: white;
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--stroke-subtle);
  }
  .toolbar h1 {
    font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .toolbar h1 strong { color: white; }
  .toolbar .meta {
    color: var(--text-tertiary); font-size: 11.5px;
    margin-left: 12px; font-weight: 500; letter-spacing: 0; text-transform: none;
  }
  .toolbar .actions { display: flex; gap: 8px; }
  .toolbar button, .toolbar a {
    background: var(--accent-gold); color: var(--bg-page);
    border: none; padding: 9px 16px; border-radius: 6px;
    font-family: inherit; font-size: 12px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    letter-spacing: 0.02em;
  }
  .toolbar a.secondary {
    background: transparent; color: white;
    border: 1px solid rgba(255,255,255,0.25);
  }

  .page {
    width: 816px; min-height: 1056px;
    background: var(--bg-page); color: var(--text-primary);
    margin: 24px auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    position: relative; display: flex; flex-direction: column;
  }

  .hero {
    padding: 28px 40px 22px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, #09233C 0%, #05172A 100%);
    border-bottom: 3px solid var(--accent-gold);
  }
  .hero-logo {
    height: 72px; width: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
  }
  .hero-right { text-align: right; }
  .hero-eyebrow {
    font-size: 11px; font-weight: 700;
    color: var(--accent-gold-light);
    letter-spacing: 0.28em; text-transform: uppercase;
  }
  .hero-h1 {
    font-size: 26px; font-weight: 800; letter-spacing: -0.015em;
    color: var(--text-primary); margin-top: 4px;
  }
  .hero-meta {
    font-size: 11px; color: var(--text-secondary); margin-top: 4px;
  }
  .hero-meta strong { color: var(--accent-gold-light); font-weight: 700; }

  .recipient {
    padding: 24px 40px 18px;
    border-bottom: 1px solid var(--stroke-subtle);
  }
  .recipient-eyebrow {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px;
  }
  .recipient-name {
    font-size: 26px; font-weight: 800; letter-spacing: -0.015em;
    color: var(--text-primary); line-height: 1.15;
  }
  .recipient-sub {
    font-size: 13px; color: var(--text-secondary);
    margin-top: 5px; font-weight: 500;
  }
  .recipient-sub strong { color: var(--accent-blue-light); font-weight: 700; }
  .recipient-to {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--stroke-subtle);
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
  }
  .recipient-to .col .label {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em;
    color: var(--text-tertiary); text-transform: uppercase;
  }
  .recipient-to .col .who {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    margin-top: 4px; line-height: 1.25;
  }
  .recipient-to .col .who-title {
    font-size: 11.5px; color: var(--text-secondary);
    margin-top: 2px; font-weight: 500;
  }

  .snapshot {
    padding: 18px 40px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--stroke-subtle);
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  }
  .snap-tile { display: flex; flex-direction: column; }
  .snap-tile .lbl {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em;
    color: var(--text-secondary); text-transform: uppercase;
  }
  .snap-tile .val {
    font-size: 22px; font-weight: 900; color: var(--accent-gold);
    line-height: 1.05; letter-spacing: -0.02em; margin-top: 4px;
  }
  .snap-tile .val .unit {
    font-size: 13px; color: var(--accent-gold-light);
    font-weight: 700; margin-left: 2px;
  }
  .snap-tile .sub {
    font-size: 10.5px; color: var(--text-tertiary);
    margin-top: 3px; font-weight: 500;
  }

  .why, .context {
    padding: 22px 40px;
    border-bottom: 1px solid var(--stroke-subtle);
  }
  .why h3, .context h3 {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--text-secondary); text-transform: uppercase;
    margin-bottom: 10px;
  }
  .why p, .context p {
    font-size: 14px; line-height: 1.55;
    color: var(--text-primary); font-weight: 500;
  }
  .why p + p, .context p + p { margin-top: 10px; }
  .why p strong, .context p strong {
    color: var(--accent-gold-light); font-weight: 700;
  }

  .invest {
    padding: 22px 40px;
    background: linear-gradient(180deg, var(--bg-panel) 0%, #07182C 100%);
    border-bottom: 1px solid var(--stroke-subtle);
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px;
  }
  .invest-main h3 {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;
  }
  .invest-amount {
    font-size: 48px; font-weight: 900; color: var(--accent-gold);
    line-height: 1; letter-spacing: -0.025em;
  }
  .invest-amount .prefix {
    font-size: 24px; color: var(--accent-gold-light);
    font-weight: 700; margin-right: 1px; vertical-align: 12px;
  }
  .invest-amount .unit {
    font-size: 16px; color: var(--accent-gold-light);
    font-weight: 700; margin-left: 6px; letter-spacing: 0.04em;
  }
  .invest-detail {
    font-size: 12.5px; color: var(--text-primary);
    margin-top: 6px; font-weight: 600;
  }
  .invest-detail .muted { color: var(--text-secondary); font-weight: 500; }
  .invest-side {
    border-left: 1px solid var(--stroke-subtle); padding-left: 24px;
  }
  .invest-side h4 {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;
  }
  .invest-line {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0; font-size: 11.5px; font-weight: 500; color: var(--text-primary);
  }
  .invest-line .v { color: var(--accent-gold-light); font-weight: 700; }
  .invest-line.tot {
    border-top: 1px solid var(--stroke-rule);
    margin-top: 4px; padding-top: 8px; font-weight: 700;
  }

  .offer {
    padding: 22px 40px;
    background: linear-gradient(180deg, var(--bg-panel) 0%, #07182C 100%);
    border-bottom: 1px solid var(--stroke-subtle);
  }
  .offer h3 {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px;
  }
  .offer-title {
    font-size: 22px; font-weight: 800; color: var(--accent-gold);
    letter-spacing: -0.015em; margin-bottom: 6px;
  }
  .offer-sub {
    font-size: 13px; color: var(--text-secondary);
    font-weight: 600; margin-bottom: 14px;
  }
  .offer-list {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    margin-bottom: 10px;
  }
  .offer-item {
    background: var(--bg-elevated);
    border-radius: 8px; padding: 12px 14px;
    border-left: 3px solid var(--accent-blue);
  }
  .offer-item .h {
    font-size: 12.5px; font-weight: 700; color: var(--text-primary); line-height: 1.2;
  }
  .offer-item .d {
    font-size: 11px; color: var(--text-secondary);
    margin-top: 4px; line-height: 1.4; font-weight: 500;
  }
  .offer-bottom {
    margin-top: 12px;
    font-size: 11.5px; color: var(--text-tertiary); font-style: italic;
  }
  .offer-bottom strong {
    color: var(--accent-gold-light); font-style: normal; font-weight: 700;
  }

  .roi {
    padding: 22px 40px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
    border-bottom: 1px solid var(--stroke-subtle);
  }
  .roi-box {
    background: var(--bg-elevated); border-radius: 10px;
    padding: 16px 18px; border-left: 3px solid var(--accent-blue);
  }
  .roi-box .lbl {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em;
    color: var(--text-secondary); text-transform: uppercase;
  }
  .roi-box .val {
    font-size: 26px; font-weight: 900; color: var(--accent-gold);
    line-height: 1; letter-spacing: -0.02em; margin: 6px 0 4px;
  }
  .roi-box .val .prefix {
    font-size: 14px; color: var(--accent-gold-light);
    font-weight: 700; margin-right: 1px; vertical-align: 5px;
  }
  .roi-box .body {
    font-size: 11.5px; color: var(--text-primary);
    line-height: 1.4; font-weight: 500;
  }

  .timeline, .path {
    padding: 22px 40px; border-bottom: 1px solid var(--stroke-subtle);
  }
  .timeline h3, .path h3 {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px;
  }
  .timeline-track, .path-track {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
  }
  .timeline-step, .path-step {
    background: var(--bg-elevated); padding: 12px 14px 10px;
    border-radius: 8px; border-top: 3px solid var(--accent-gold);
  }
  .step-n {
    font-size: 9px; font-weight: 800; letter-spacing: 0.14em;
    color: var(--accent-gold-light); text-transform: uppercase;
  }
  .step-h {
    font-size: 12.5px; font-weight: 700; color: var(--text-primary);
    margin-top: 4px; line-height: 1.2;
  }
  .step-d {
    font-size: 10.5px; color: var(--text-secondary);
    margin-top: 4px; line-height: 1.35; font-weight: 500;
  }

  .proof {
    padding: 18px 40px 22px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--stroke-subtle);
  }
  .proof-card {
    border-left: 3px solid var(--accent-gold); padding: 4px 0 4px 14px;
  }
  .proof-card .src {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--accent-blue-light); text-transform: uppercase;
  }
  .proof-card .q {
    font-size: 13.5px; font-weight: 600; color: var(--text-primary);
    margin: 4px 0 4px; line-height: 1.35;
  }
  .proof-card .q em { font-style: normal; color: var(--accent-gold-light); }
  .proof-card .who {
    font-size: 10.5px; color: var(--text-tertiary);
    font-weight: 500; letter-spacing: 0.02em;
  }

  .footer {
    padding: 22px 40px;
    background: linear-gradient(180deg, #05172A 0%, #03101F 100%);
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center;
  }
  .footer-text .ask {
    font-size: 16px; font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .footer-text .sig {
    font-size: 11.5px; color: var(--text-secondary); margin-top: 4px;
  }
  .footer-text .sig strong { color: var(--accent-gold-light); font-weight: 700; }
  .footer .cta {
    background: var(--accent-gold); color: var(--bg-page);
    padding: 14px 22px; border-radius: 8px;
    font-size: 13px; font-weight: 800; letter-spacing: 0.04em;
    text-transform: uppercase; text-decoration: none;
    box-shadow: 0 4px 16px rgba(255,174,0,0.25);
  }

  .loading, .errpanel {
    padding: 60px 40px;
    text-align: center;
    color: var(--text-secondary);
  }
  .loading .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid var(--stroke-subtle);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .errpanel {
    color: var(--accent-red);
    font-weight: 600;
  }
  .errpanel pre {
    margin-top: 12px;
    padding: 12px;
    background: rgba(210,81,81,0.08);
    border: 1px solid rgba(210,81,81,0.3);
    border-radius: 6px;
    color: var(--text-secondary);
    font-size: 11.5px;
    font-family: 'JetBrains Mono', monospace;
    text-align: left;
    overflow-x: auto;
  }

  @media print {
    @page { size: letter portrait; margin: 0; }
    html, body { width: 8.5in; background: var(--bg-page) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .toolbar { display: none !important; }
    .page { margin: 0 !important; box-shadow: none !important; width: 100% !important; }
  }

  [contenteditable="true"] { outline: none; border-radius: 3px; transition: background 0.15s, box-shadow 0.15s; }
  [contenteditable="true"]:hover {
    background: rgba(255,174,0,0.08);
    box-shadow: inset 0 -1px 0 rgba(255,174,0,0.45);
    cursor: text;
  }
  [contenteditable="true"]:focus {
    background: rgba(255,174,0,0.14);
    box-shadow: inset 0 -2px 0 var(--accent-gold);
  }
  @media print {
    [contenteditable="true"]:hover, [contenteditable="true"]:focus {
      background: none !important; box-shadow: none !important;
    }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1><strong>MD Ally</strong> · Proposal Generator
    <span id="meta-strap" class="meta">click any text to tailor</span>
  </h1>
  <div class="actions">
    <button id="btn-print">Save as PDF</button>
    <a href="#" id="btn-reset" class="secondary">Reset Edits</a>
    <a href="/" class="secondary">← Agency Intel</a>
  </div>
</div>

<div id="proposal-root">
  <div class="page">
    <div class="loading">
      <div class="spinner"></div>
      <div id="loading-text">Loading proposal…</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// Proposal Generator client
//
// URL contract:
//   ?dealId=N  → fetch /api/proposal/render?dealId=N from Pulse,
//                pick render shape from proposal_type
//   (no arg)   → render REMSA cover as the v1 design reference
// ============================================================
const PULSE_BASE = "https://pulse-production-71ee.up.railway.app";
const PARAMS = new URLSearchParams(location.search);
const DEAL_ID = PARAMS.get("dealId");

// Per-deal localStorage namespace so client A's edits don't leak into client B.
const EDIT_NS = DEAL_ID
  ? `mdally.proposal.${DEAL_ID}.edits.v1`
  : "mdally.proposal.default.edits.v1";

function loadEdits() {
  try { return JSON.parse(localStorage.getItem(EDIT_NS) || "{}"); }
  catch { return {}; }
}
function saveEdits(e) {
  try { localStorage.setItem(EDIT_NS, JSON.stringify(e)); } catch {}
}

function fmtMoney(n) {
  if (typeof n !== "number" || !Number.isFinite(n)) return "…";
  return "$" + Math.round(n).toLocaleString();
}
function fmtDate(iso, fmt) {
  if (!iso) return "TBD";
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return iso;
  const month = d.toLocaleString("en-US", { month: "long" });
  const day = d.getDate();
  const year = d.getFullYear();
  if (fmt === "short") return `${month.slice(0,3)} ${day}, ${year}`;
  return `${month} ${day}, ${year}`;
}
function fmtPop(n) {
  if (typeof n !== "number" || !Number.isFinite(n)) return "…";
  if (n >= 1_000_000) return `${(n/1_000_000).toFixed(1)}M`;
  if (n >= 1_000) return `${Math.round(n/1000)}K`;
  return String(n);
}
function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
}
// Title-case OSM/HubSpot strings while preserving common acronyms.
const ACR = new Set(["FPD","FD","EMS","PSAP","ALS","BLS","NPI","RFD","CFR","EMTD","MIH","ED","LLC","LP","LLP","INC","CO","CORP","PA","911","REMSA","SRVFPD","HCFR","NENA","APCO","IAED","CMS","NEMSIS"]);
function pretty(raw) {
  if (!raw) return "";
  return String(raw).trim().split(/\s+/).map(w => {
    // Strip surrounding punctuation to check if the inner token is an acronym
    // (e.g. "(REMSA)" → check "REMSA"), but preserve the punctuation in output.
    const m = w.match(/^(\W*)([A-Za-z0-9-]+)(\W*)$/);
    if (m) {
      const [, lead, core, tail] = m;
      const u = core.toUpperCase();
      if (ACR.has(u)) return lead + u + tail;
      const cased = core.split("-").map(p => p ? p[0].toUpperCase() + p.slice(1).toLowerCase() : p).join("-");
      return lead + cased + tail;
    }
    return w;
  }).join(" ");
}

function renderError(message, detail) {
  document.getElementById("proposal-root").innerHTML = `
    <div class="page">
      <div class="errpanel">
        <div style="font-size:18px;margin-bottom:8px;">Couldn't load proposal</div>
        <div style="font-size:13px;color:var(--text-secondary);">${escapeHtml(message)}</div>
        ${detail ? `<pre>${escapeHtml(detail)}</pre>` : ""}
      </div>
    </div>
  `;
}

// ---------- YEAR-1 PARTNERSHIP shape (REMSA template) ----------
function renderYear1(data) {
  const amount = data.quote?.amount ?? data.deal?.amount ?? 0;
  const currency = data.quote?.currency ?? data.deal?.currency ?? "USD";
  const created = data.quote?.created_at ?? data.deal?.created_at;
  const expires = data.quote?.expires_at;
  const company = data.company;
  const primary = data.contacts?.primary;
  const ccList = (data.contacts?.cc ?? []).map(c => c.name).join(" · ");

  // Cost-structure split. Driven by total amount when no line items are
  // surfaced by the endpoint yet. Percentages match the price-book share
  // (clinical staffing dominant, integration step-down, reporting +
  // program management as fixed-ish). Editable per client.
  const split = (pct) => Math.round(amount * pct);

  return `
    <div class="page" id="capture">
      <div class="hero">
        <img class="hero-logo" src="/footprint/assets/md-ally-logo-white.png" alt="MD Ally">
        <div class="hero-right">
          <div class="hero-eyebrow">Partnership Proposal · Year 1</div>
          <div class="hero-h1" contenteditable="true" data-edit="hero-h1">Public Safety Telehealth Program</div>
          <div class="hero-meta">
            ${data.quote?.number ? `Quote <strong contenteditable="true" data-edit="quote-num">#${escapeHtml(data.quote.number)}</strong> · ` : ""}
            Prepared <strong contenteditable="true" data-edit="prepared">${fmtDate(created)}</strong>
            ${expires ? ` · Valid through <strong contenteditable="true" data-edit="expires">${fmtDate(expires)}</strong>` : ""}
          </div>
        </div>
      </div>

      <div class="recipient">
        <div class="recipient-eyebrow">Prepared for</div>
        <div class="recipient-name" contenteditable="true" data-edit="recipient">${escapeHtml(pretty(company.name))}</div>
        <div class="recipient-sub" contenteditable="true" data-edit="recipient-sub">
          ${company.city ? escapeHtml(pretty(company.city)) + (company.state ? ", " + escapeHtml(company.state) : "") : (company.state ? escapeHtml(company.state) : "")}
        </div>
        ${primary ? `
        <div class="recipient-to">
          <div class="col">
            <div class="label">Primary Recipient (TO)</div>
            <div class="who" contenteditable="true" data-edit="to-name">${escapeHtml(primary.name)}</div>
            <div class="who-title" contenteditable="true" data-edit="to-title">${escapeHtml(primary.title ?? "")}${primary.email ? " · " + escapeHtml(primary.email) : ""}</div>
          </div>
          ${ccList ? `
          <div class="col">
            <div class="label">Copied (CC)</div>
            <div class="who" contenteditable="true" data-edit="cc">${escapeHtml(ccList)}</div>
            <div class="who-title" contenteditable="true" data-edit="cc-title">${(data.contacts.cc ?? []).map(c => c.title).filter(Boolean).join(" · ")}</div>
          </div>
          ` : ""}
        </div>
        ` : ""}
      </div>

      ${(() => {
        const A = data.agency?.record;
        const popDisplay = A?.populationServed ? fmtPop(A.populationServed) : "…";
        const popSub = A?.county ? `${pretty(A.county)} County · edit to refine` : "Direct jurisdictional · edit to set";
        const psapType = A?.psapType ? pretty(A.psapType) : null;
        return `
      <div class="snapshot">

// ---------- Wire-up ----------
function wireEditable(root) {
  const edits = loadEdits();
  root.querySelectorAll("[data-edit]").forEach(el => {
    const key = el.getAttribute("data-edit");
    if (key in edits && typeof edits[key] === "string") el.textContent = edits[key];
    el.addEventListener("input", () => {
      const next = loadEdits();
      next[key] = el.textContent;
      saveEdits(next);
    });
  });
}

function setMeta(text) {
  const el = document.getElementById("meta-strap");
  if (el) el.textContent = text;
}

async function main() {
  const root = document.getElementById("proposal-root");

  if (!DEAL_ID) {
    setMeta("MVP · no dealId in URL, rendering REMSA design reference · click any text to tailor");
    root.innerHTML = renderStaticFallback();
    wireEditable(root);
    return;
  }

  document.getElementById("loading-text").textContent =
    `Loading proposal for deal ${DEAL_ID}…`;

  try {
    const res = await fetch(`${PULSE_BASE}/api/proposal/render?dealId=${encodeURIComponent(DEAL_ID)}`);
    if (!res.ok) {
      const body = await res.text().catch(() => "");
      renderError(`Pulse returned HTTP ${res.status}`, body);
      return;
    }
    const data = await res.json();

    setMeta(`HubSpot deal ${DEAL_ID} · ${data.proposal_type} variant · click any text to tailor`);

    root.innerHTML = data.proposal_type === "discovery"
      ? renderDiscovery(data)
      : renderYear1(data);

    wireEditable(root);
  } catch (err) {
    renderError("Network error reaching Pulse", err?.message ?? String(err));
  }
}

document.getElementById("btn-print").addEventListener("click", () => {
  const prev = document.title;
  const slug = DEAL_ID ? `deal-${DEAL_ID}` : "remsa";
  document.title = `MD_Ally_Proposal_${slug}_${new Date().toISOString().slice(0,10)}`;
  window.print();
  setTimeout(() => { document.title = prev; }, 500);
});

document.getElementById("btn-reset").addEventListener("click", (e) => {
  e.preventDefault();
  if (!confirm("Discard per-client edits for this proposal and reload?")) return;
  localStorage.removeItem(EDIT_NS);
  location.reload();
});

main();
